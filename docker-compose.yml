version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: mimic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mimic_prediction
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (FastAPI :8000)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mimic_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mimic_prediction
      SECRET_KEY: production-secret-key-change-me
      ML_SERVICE_URL: http://ml_service:8001
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ============================================
  # ML Service (FastAPI :8001)
  # ============================================
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: mimic_ml_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mimic_prediction
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml_service:/app

  # ============================================
  # MLflow Tracking Server
  # ============================================
  mlflow:
    image: python:3.11-slim
    container_name: mimic_mlflow
    restart: unless-stopped
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 && 
      mlflow server 
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mimic_prediction 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0 
      --port 5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlflow/artifacts

  # ============================================
  # Frontend (React + Vite :5173)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mimic_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
  mlflow_artifacts:
